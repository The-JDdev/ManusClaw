[build-system]
requires      = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name        = "manusclaw"
version     = "3.2.0"
description = "ManusClaw — Open-Source Autonomous AI Ecosystem"
readme      = "README.md"
license     = { text = "MIT" }
requires-python = ">=3.10"

authors = [
  { name = "SHS Shobuj (The-JDdev)", email = "the-jddev@users.noreply.github.com" }
]

keywords = ["ai", "agent", "autonomous", "llm", "multi-agent", "cli",
            "offline", "local", "manusclaw"]

classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Environment :: Console",
  "Operating System :: OS Independent",
]

dependencies = [
  "pydantic>=2.0",
  "toml>=0.10",
  "aiofiles>=23.0",
]

[project.optional-dependencies]
server = [
  "fastapi>=0.110",
  "uvicorn[standard]>=0.29",
  "websockets>=12.0",
]
browser = [
  "playwright>=1.44",
]
http = [
  "httpx>=0.27",
  "aiohttp>=3.9",
]
offline = [
  "llama-cpp-python>=0.2.80",
]
desktop = [
  "flet>=0.23",
]
all = [
  "fastapi>=0.110",
  "uvicorn[standard]>=0.29",
  "websockets>=12.0",
  "playwright>=1.44",
  "httpx>=0.27",
  "aiohttp>=3.9",
  "flet>=0.23",
]

[project.scripts]
manusclaw         = "app.cli:main"
Manusclaw         = "app.cli:main"
manusclaw-server  = "app.server.main:serve"
manusclaw-multi   = "app.multi_agent:run_cli"
manusclaw-desktop = "app.desktop.main:main_entry"

[project.urls]
Homepage    = "https://github.com/The-JDdev/ManusClaw"
Issues      = "https://github.com/The-JDdev/ManusClaw/issues"
Web         = "https://the-jddev.github.io/manusclaw-web/"

[tool.setuptools.packages.find]
where   = ["."]
include = ["app*"]

[tool.setuptools.package-data]
"*" = ["*.toml", "*.md", "*.sql", "*.json", "*.yaml"]
