[build-system]
requires      = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name        = "manusclaw"
version     = "3.2.0"
description = "ManusClaw — Open-Source Autonomous AI Ecosystem"
readme      = "README.md"
license     = { text = "MIT" }
requires-python = ">=3.10"

authors = [
  { name = "SHS Shobuj (The-JDdev)", email = "the-jddev@users.noreply.github.com" }
]

keywords = ["ai", "agent", "autonomous", "llm", "multi-agent", "cli",
            "offline", "local", "manusclaw"]

classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Environment :: Console",
  "Operating System :: OS Independent",
]

dependencies = [
  # Core runtime
  "pydantic>=2.7,<3",
  "loguru>=0.7",
  "python-dotenv>=1.0",
  # TOML parsing (stdlib tomllib on 3.11+)
  "tomli>=2.0; python_version < '3.11'",
  # Async file I/O
  "aiofiles>=23.0",
]

[project.optional-dependencies]
llm = [
  "openai>=1.30",
  "anthropic>=0.28",
  "tiktoken>=0.7",
]
server = [
  "fastapi>=0.111",
  "uvicorn[standard]>=0.30",
  "websockets>=12.0",
]
browser = [
  "playwright>=1.44",
]
http = [
  "httpx>=0.27",
  "aiohttp>=3.9",
  "duckduckgo-search>=6.2",
]
data = [
  "matplotlib>=3.9",
  "mpld3>=0.5.10",
]
crawl = [
  "crawl4ai>=0.3",
]
offline = [
  "llama-cpp-python>=0.2.80",
]
desktop = [
  "flet>=0.23",
]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
]
all = [
  "openai>=1.30",
  "anthropic>=0.28",
  "tiktoken>=0.7",
  "fastapi>=0.111",
  "uvicorn[standard]>=0.30",
  "websockets>=12.0",
  "playwright>=1.44",
  "httpx>=0.27",
  "aiohttp>=3.9",
  "duckduckgo-search>=6.2",
  "matplotlib>=3.9",
  "mpld3>=0.5.10",
  "crawl4ai>=0.3",
  "flet>=0.23",
  "pytest>=8",
  "pytest-asyncio>=0.23",
]

[project.scripts]
manusclaw         = "app.cli:main"
Manusclaw         = "app.cli:main"
manusclaw-server  = "app.server.main:serve"
manusclaw-multi   = "app.multi_agent:run_cli"
manusclaw-desktop = "app.desktop.main:main_entry"

[project.urls]
Homepage    = "https://github.com/The-JDdev/ManusClaw"
Issues      = "https://github.com/The-JDdev/ManusClaw/issues"
Web         = "https://the-jddev.github.io/manusclaw-web/"

[tool.setuptools.packages.find]
where   = ["."]
include = ["app*"]

[tool.setuptools.package-data]
"*" = ["*.toml", "*.md", "*.sql", "*.json", "*.yaml", ".env.example"]
