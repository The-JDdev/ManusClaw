<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManusClaw WebChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-tertiary: #242836;
  --bg-hover: #2d3143;
  --text-primary: #e4e6f0;
  --text-secondary: #9ca3b8;
  --text-muted: #6b7280;
  --accent: #7c6ef0;
  --accent-hover: #8f82f2;
  --accent-dim: rgba(124, 110, 240, 0.15);
  --border: #2d3143;
  --border-focus: #7c6ef0;
  --success: #34d399;
  --warning: #fbbf24;
  --error: #f87171;
  --info: #60a5fa;
  --user-bubble: #7c6ef0;
  --assistant-bubble: #1e2235;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

[data-theme="light"] {
  --bg-primary: #f8f9fc;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f0f1f5;
  --bg-hover: #e8eaf0;
  --text-primary: #1a1d27;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --accent: #6c5ce7;
  --accent-hover: #5b4bd5;
  --accent-dim: rgba(108, 92, 231, 0.1);
  --border: #e5e7eb;
  --border-focus: #6c5ce7;
  --user-bubble: #6c5ce7;
  --assistant-bubble: #f0f1f5;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}

/* ─── Auth Bar ─── */
.auth-bar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.auth-bar label {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}
.auth-bar input {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  color: var(--text-primary);
  font-family: var(--mono);
  font-size: 13px;
  width: 280px;
  outline: none;
  transition: border-color 0.2s;
}
.auth-bar input:focus { border-color: var(--border-focus); }
.auth-bar button {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.auth-bar button:hover { background: var(--accent-hover); }
.auth-status {
  font-size: 12px;
  margin-left: auto;
  color: var(--text-muted);
}
.auth-status.connected { color: var(--success); }
.auth-status.error { color: var(--error); }

/* ─── Header ─── */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header h1 .logo {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.header-actions { display: flex; gap: 8px; align-items: center; }
.header-actions button {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 14px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.header-actions button:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* ─── Main layout ─── */
.chat-container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 90px);
  max-width: 900px;
  margin: 0 auto;
}

/* ─── Messages ─── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.message {
  display: flex;
  gap: 10px;
  max-width: 85%;
  animation: slideIn 0.2s ease-out;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.assistant { align-self: flex-start; }
.message.system { align-self: center; max-width: 90%; }

.message-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.message.user .message-avatar {
  background: var(--user-bubble);
  color: #fff;
}
.message.assistant .message-avatar {
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid var(--border);
}

.message-bubble {
  border-radius: var(--radius);
  padding: 10px 16px;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
}
.message.user .message-bubble {
  background: var(--user-bubble);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.message.assistant .message-bubble {
  background: var(--assistant-bubble);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message.system .message-bubble {
  background: var(--accent-dim);
  color: var(--text-secondary);
  font-size: 12px;
  text-align: center;
  padding: 6px 16px;
  border-radius: 20px;
}

/* Markdown in messages */
.message-bubble h1, .message-bubble h2, .message-bubble h3 {
  margin: 12px 0 6px;
  font-weight: 600;
}
.message-bubble h1 { font-size: 18px; }
.message-bubble h2 { font-size: 16px; }
.message-bubble h3 { font-size: 14px; }
.message-bubble p { margin: 4px 0; }
.message-bubble ul, .message-bubble ol { margin: 4px 0 4px 20px; }
.message-bubble code {
  background: rgba(0,0,0,0.15);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 13px;
}
[data-theme="light"] .message.user .message-bubble code {
  background: rgba(255,255,255,0.2);
}
.message-bubble pre {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  overflow-x: auto;
  margin: 8px 0;
}
.message-bubble pre code {
  background: none;
  padding: 0;
  font-size: 13px;
  line-height: 1.5;
}
.message-bubble blockquote {
  border-left: 3px solid var(--accent);
  margin: 8px 0;
  padding-left: 12px;
  color: var(--text-secondary);
}
.message-bubble a {
  color: var(--accent);
  text-decoration: none;
}
.message-bubble a:hover { text-decoration: underline; }
.message-bubble table {
  border-collapse: collapse;
  margin: 8px 0;
  width: 100%;
}
.message-bubble th, .message-bubble td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
  font-size: 13px;
}
.message-bubble th {
  background: var(--bg-tertiary);
  font-weight: 600;
}

/* Thinking indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}
.typing-indicator span {
  width: 8px; height: 8px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typingBounce 1.4s infinite ease-in-out;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* File attachment */
.file-preview {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  font-size: 12px;
  margin: 4px 0;
}
.file-preview .file-icon { font-size: 16px; }

/* ─── Input area ─── */
.input-area {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 12px 20px;
}
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
.input-row textarea {
  flex: 1;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  min-height: 42px;
  max-height: 200px;
  outline: none;
  transition: border-color 0.2s;
}
.input-row textarea:focus { border-color: var(--border-focus); }
.input-row button.send-btn {
  width: 42px; height: 42px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.1s;
  flex-shrink: 0;
}
.input-row button.send-btn:hover { background: var(--accent-hover); }
.input-row button.send-btn:active { transform: scale(0.95); }
.input-row button.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.input-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 6px;
}
.input-actions button {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  display: flex; align-items: center; gap: 4px;
  transition: all 0.2s;
}
.input-actions button:hover {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
}
#file-input { display: none; }

.input-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: auto;
}

/* ─── Canvas preview ─── */
.canvas-preview {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  max-height: 300px;
}
.canvas-preview iframe {
  width: 100%;
  height: 280px;
  border: none;
}

/* ─── Step indicators ─── */
.step-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 600;
  margin: 4px 0;
}
.step-badge.step_start {
  background: var(--accent-dim);
  color: var(--accent);
}
.step-badge.agent_done {
  background: rgba(52, 211, 153, 0.15);
  color: var(--success);
}
.step-badge.agent_error {
  background: rgba(248, 113, 113, 0.15);
  color: var(--error);
}

/* ─── Responsive ─── */
@media (max-width: 640px) {
  .message { max-width: 95%; }
  .auth-bar input { width: 200px; }
  .chat-container { height: calc(100vh - 82px); }
}
</style>
</head>
<body data-theme="dark">

<!-- Auth bar -->
<div class="auth-bar">
  <label for="api-key-input">🔑 API Key:</label>
  <input type="password" id="api-key-input" placeholder="Enter MANUSCLAW_API_KEY (optional)">
  <button id="connect-btn" onclick="connectWebSocket()">Connect</button>
  <span class="auth-status" id="auth-status">Disconnected</span>
</div>

<!-- Header -->
<div class="header">
  <h1>
    <span class="logo">🦀</span>
    ManusClaw WebChat
  </h1>
  <div class="header-actions">
    <button onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <button onclick="openCanvasPreview()" title="Open canvas preview">📊</button>
    <button onclick="clearMessages()" title="Clear chat">🗑</button>
  </div>
</div>

<!-- Chat container -->
<div class="chat-container">
  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Canvas preview (collapsible) -->
  <div id="canvas-container" style="display:none; padding: 0 20px 10px;">
    <div class="canvas-preview">
      <iframe id="canvas-iframe" src="" sandbox="allow-scripts"></iframe>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="message-input"
        placeholder="Type your message... (Shift+Enter for new line, Enter to send)"
        rows="1"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-actions">
      <button onclick="document.getElementById('file-input').click()">📎 Attach</button>
      <button onclick="insertMarkdown('`code`')"> &lt;/&gt; Code</button>
      <span class="input-hint">Enter to send · Shift+Enter for newline</span>
    </div>
    <input type="file" id="file-input" multiple onchange="handleFileSelect(event)">
  </div>
</div>

<script>
// ─── State ───
let ws = null;
let sessionId = generateSessionId();
let isConnected = false;
let pendingFiles = [];

// ─── Configure marked ───
marked.setOptions({
  breaks: true,
  gfm: true,
  headerIds: false,
  mangle: false
});

// ─── Helpers ───
function generateSessionId() {
  return 'web-' + Math.random().toString(36).substring(2, 10);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function getApiUrl() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${proto}//${location.host}`;
}

function getApiKey() {
  return document.getElementById('api-key-input').value.trim();
}

function insertMarkdown(snippet) {
  const ta = document.getElementById('message-input');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const text = ta.value;
  ta.value = text.substring(0, start) + snippet + text.substring(end);
  ta.focus();
  ta.selectionStart = ta.selectionEnd = start + snippet.length;
}

// ─── WebSocket ───
function connectWebSocket() {
  if (ws) {
    ws.close();
  }

  const statusEl = document.getElementById('auth-status');
  statusEl.textContent = 'Connecting...';
  statusEl.className = 'auth-status';

  const apiKey = getApiKey();
  let url = `${getApiUrl()}/ws/chat/${sessionId}`;
  if (apiKey) {
    url += `?api_key=${encodeURIComponent(apiKey)}`;
  }

  try {
    ws = new WebSocket(url);
  } catch (e) {
    statusEl.textContent = 'Connection failed';
    statusEl.className = 'auth-status error';
    return;
  }

  ws.onopen = () => {
    isConnected = true;
    statusEl.textContent = '● Connected';
    statusEl.className = 'auth-status connected';
    document.getElementById('connect-btn').textContent = 'Disconnect';
    addSystemMessage(`Connected to ManusClaw (session: ${sessionId})`);
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      handleMessage(msg);
    } catch (e) {
      console.error('Failed to parse message:', e);
    }
  };

  ws.onclose = (event) => {
    isConnected = false;
    const reason = event.reason || 'disconnected';
    statusEl.textContent = 'Disconnected';
    statusEl.className = 'auth-status error';
    document.getElementById('connect-btn').textContent = 'Connect';
    addSystemMessage(`Disconnected: ${reason}`);
  };

  ws.onerror = () => {
    statusEl.textContent = 'Connection error';
    statusEl.className = 'auth-status error';
  };
}

function disconnectWebSocket() {
  if (ws) {
    ws.close();
    ws = null;
  }
  isConnected = false;
}

function sendRaw(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  } else {
    addSystemMessage('Not connected. Click "Connect" to start.');
  }
}

// ─── Message handling ───
function handleMessage(msg) {
  switch (msg.type) {
    case 'connected':
      // Already handled in onopen
      break;

    case 'agent_start':
      addSystemMessage(`🚀 Agent started: ${escapeHtml(msg.prompt || '')}`);
      showTypingIndicator();
      break;

    case 'step_start':
      addStepBadge(`Step ${msg.step}`, 'step_start');
      break;

    case 'step_output':
      hideTypingIndicator();
      appendAssistantMessage(msg.content || '', false);
      showTypingIndicator();
      break;

    case 'agent_done':
      hideTypingIndicator();
      appendAssistantMessage(msg.output || '', true);
      addStepBadge('Done', 'agent_done');
      break;

    case 'agent_error':
      hideTypingIndicator();
      addStepBadge('Error', 'agent_error');
      addSystemMessage(`⚠️ Agent error: ${escapeHtml(msg.error || 'Unknown')}`);
      break;

    case 'message':
      // Direct message (from chat endpoint)
      if (msg.role === 'user') {
        // Skip our own messages
        return;
      }
      hideTypingIndicator();
      appendAssistantMessage(msg.text || msg.content || '', true);
      break;

    case 'broadcast':
      addSystemMessage(`📢 ${escapeHtml(msg.text || '')}`);
      break;

    case 'error':
      hideTypingIndicator();
      addSystemMessage(`❌ ${escapeHtml(msg.message || '')}`);
      break;

    case 'canvas_update':
      showCanvasPreview(msg.session_id || sessionId);
      break;

    default:
      console.log('Unknown message type:', msg.type, msg);
  }
}

// ─── UI functions ───
function addMessage(role, content, isMarkdown = false) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'message-avatar';
  avatar.textContent = role === 'user' ? '👤' : '🦀';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';

  if (isMarkdown && role === 'assistant') {
    bubble.innerHTML = marked.parse(content);
  } else {
    bubble.textContent = content;
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;

  return bubble;
}

function appendAssistantMessage(content, isMarkdown = false) {
  // Find or create the last assistant message bubble to append to
  const container = document.getElementById('messages');
  let lastAssistant = container.querySelector('.message.assistant:last-child .message-bubble');

  if (!lastAssistant) {
    addMessage('assistant', '', false);
    lastAssistant = container.querySelector('.message.assistant:last-child .message-bubble');
  }

  if (isMarkdown) {
    lastAssistant.innerHTML += marked.parse('\n' + content);
  } else {
    lastAssistant.innerHTML += '<br>' + escapeHtml(content);
  }

  container.scrollTop = container.scrollHeight;
}

function addSystemMessage(text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message system';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = text;

  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addStepBadge(text, cls) {
  const container = document.getElementById('messages');
  const badge = document.createElement('div');
  badge.className = `step-badge ${cls}`;
  badge.textContent = text;
  container.appendChild(badge);
  container.scrollTop = container.scrollHeight;
}

function showTypingIndicator() {
  let existing = document.getElementById('typing-indicator');
  if (existing) return;

  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'message-avatar';
  avatar.textContent = '🦀';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function clearMessages() {
  document.getElementById('messages').innerHTML = '';
  sessionId = generateSessionId();
  addSystemMessage('Chat cleared. New session: ' + sessionId);
}

// ─── Send message ───
function sendMessage() {
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text && pendingFiles.length === 0) return;

  // Show user message
  let displayText = text;
  if (pendingFiles.length > 0) {
    displayText += (text ? '\n' : '') + pendingFiles.map(f => `📎 ${f.name}`).join('\n');
  }

  addMessage('user', displayText);
  input.value = '';
  autoResize(input);

  // Build WS payload
  const payload = {
    type: 'prompt',
    prompt: text,
    mode: 'build',
    max_steps: 30,
  };

  // Attach files as base64
  if (pendingFiles.length > 0) {
    payload.files = pendingFiles.map(f => ({
      name: f.name,
      type: f.type,
      data: f.data,
    }));
    pendingFiles = [];
  }

  sendRaw(payload);
}

// ─── File handling ───
function handleFileSelect(event) {
  const files = event.target.files;
  if (!files.length) return;

  Array.from(files).forEach(file => {
    if (file.size > 10 * 1024 * 1024) {
      addSystemMessage(`⚠️ File too large: ${file.name} (max 10MB)`);
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      pendingFiles.push({
        name: file.name,
        type: file.type,
        data: base64,
      });
      addSystemMessage(`📎 Attached: ${file.name}`);
    };
    reader.readAsDataURL(file);
  });

  // Reset file input
  event.target.value = '';
}

// ─── Theme toggle ───
function toggleTheme() {
  const body = document.body;
  const current = body.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  body.setAttribute('data-theme', next);

  const btn = document.querySelector('.header-actions button');
  btn.textContent = next === 'dark' ? '🌙' : '☀️';

  localStorage.setItem('manusclaw-theme', next);
}

// Restore theme
(function() {
  const saved = localStorage.getItem('manusclaw-theme');
  if (saved) {
    document.body.setAttribute('data-theme', saved);
    const btn = document.querySelector('.header-actions button');
    if (btn) btn.textContent = saved === 'dark' ? '🌙' : '☀️';
  }
})();

// ─── Canvas preview ───
function openCanvasPreview() {
  const container = document.getElementById('canvas-container');
  const iframe = document.getElementById('canvas-iframe');

  if (container.style.display === 'none') {
    container.style.display = 'block';
    iframe.src = `/canvas?session=${sessionId}&embedded=true`;
  } else {
    container.style.display = 'none';
    iframe.src = '';
  }
}

function showCanvasPreview(sid) {
  const container = document.getElementById('canvas-container');
  const iframe = document.getElementById('canvas-iframe');
  container.style.display = 'block';
  iframe.src = `/canvas?session=${sid}&embedded=true`;
}

// ─── Auto-resize textarea ───
function autoResize(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
}

// ─── Event listeners ───
const messageInput = document.getElementById('message-input');

messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

messageInput.addEventListener('input', () => {
  autoResize(messageInput);
});

// Connect button toggles
document.getElementById('connect-btn').addEventListener('click', (e) => {
  e.preventDefault();
  if (isConnected) {
    disconnectWebSocket();
  } else {
    connectWebSocket();
  }
});

// Auto-connect on load if no API key required
window.addEventListener('load', () => {
  addSystemMessage('Welcome to ManusClaw WebChat. Click "Connect" to begin.');
});
</script>
