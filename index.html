<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ManusClaw v4.0 · Autonomous AI Ecosystem</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        heading: ["'Instrument Serif'", 'serif'],
                        body: ["'Barlow'", 'sans-serif'],
                        mono: ["'JetBrains Mono'", 'monospace'],
                    },
                    borderRadius: { DEFAULT: '9999px' },
                },
            },
        }
    </script>

    <style>
        *,
        *::before,
        *::after { box-sizing: border-box; margin:0; padding:0; }
        body {
            background: #020205;
            color: #fff;
            font-family: 'Barlow', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        /* Glass design system */
        .glass {
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .glass-strong {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .card-hover {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .card-hover:hover {
            transform: translateY(-6px);
            border-color: rgba(255,160,40,0.4);
            box-shadow: 0 30px 60px rgba(255,100,20,0.25);
        }

        /* Highlight text */
        .hl {
            background: linear-gradient(135deg, #ff7b1a, #e04000);
            color: #fff;
            padding: 0.08em 0.35em;
            border-radius: 0.35em;
            font-weight: 600;
            display: inline-block;
        }
        .hl-cyan {
            background: linear-gradient(135deg, #0098c7, #005f8a);
        }

        /* Terminal */
        .terminal-box {
            background: rgba(6,6,14,0.94);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.25rem;
            padding: 1.4rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #c0d8ff;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            max-height: 380px;
            overflow-y: auto;
        }
        .terminal-line {
            animation: fadeLine 0.08s forwards;
            white-space: pre-wrap;
            word-break: break-word;
        }
        @keyframes fadeLine { from{opacity:0;} to{opacity:1;} }
        .cursor-blk {
            display:inline-block; width:0.5em; height:1.1em; background:#ffb020;
            vertical-align:middle; animation:blink 0.9s infinite;
        }
        @keyframes blink { 0%,50%{opacity:1;} 51%,100%{opacity:0;} }

        /* Chat bubbles */
        .chat-bubble {
            max-width:82%; padding:0.7rem 1.1rem; border-radius:1.6rem;
            margin-bottom:0.7rem; font-size:0.88rem; line-height:1.4;
            word-break:break-word; animation:popIn 0.35s ease-out;
        }
        .chat-user {
            background:rgba(255,255,255,0.07); align-self:flex-end;
            border-bottom-right-radius:0.3rem; margin-left:auto;
        }
        .chat-agent {
            background:rgba(255,140,20,0.18); border-bottom-left-radius:0.3rem;
            margin-right:auto;
        }
        @keyframes popIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

        /* Mind map */
        .mind-node {
            position:absolute; width:56px; height:56px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-weight:700; font-size:0.65rem; text-align:center; line-height:1.2;
            border:2px solid; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px);
            animation:nodePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity:0; transform:scale(0);
        }
        @keyframes nodePop { to{opacity:1;transform:scale(1);} }
        .mind-line {
            stroke-dasharray:300; stroke-dashoffset:300;
            animation:draw 1.2s ease-in-out forwards;
        }
        @keyframes draw { to{stroke-dashoffset:0;} }

        /* Reveal on scroll */
        .reveal-el {
            opacity:0; transform:translateY(35px); filter:blur(6px);
            transition: opacity 0.7s ease, transform 0.7s ease, filter 0.7s ease;
        }
        .reveal-el.visible { opacity:1; transform:translateY(0); filter:blur(0); }

        /* 3D agent wrapper */
        .agent-3d-wrap {
            border-radius:2.5rem; overflow:hidden;
            background:radial-gradient(circle at center, rgba(255,100,30,0.15) 0%, transparent 65%);
            box-shadow:0 0 80px rgba(255,80,20,0.25), 0 0 160px rgba(0,180,255,0.12);
            position:relative;
        }
        .agent-glow {
            position:absolute; inset:-20px; border-radius:inherit;
            background:conic-gradient(from 0deg, #ff6a00, #00a6ff, #ff6a00, #00a6ff, #ff6a00);
            filter:blur(60px); opacity:0.35; animation:spinGlow 8s linear infinite;
            pointer-events:none; z-index:-1;
        }
        @keyframes spinGlow { to{transform:rotate(360deg);} }

        /* Smooth anchor */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
    <script>
        window.Motion = window.FramerMotion || {
            motion: { div:'div',span:'span',p:'p',h1:'h1',h2:'h2',h3:'h3',section:'section',main:'main',nav:'nav',button:'button',a:'a',svg:'svg',g:'g',line:'line',circle:'circle',text:'text' },
            useInView: () => true,
            AnimatePresence: ({ children }) => children,
        };
        console.error = (...a) => { if (typeof a[0]==='string' && a[0].includes('unique "key"')) return; console.error.apply(console,a); };
    </script>

    <script type="text/babel">
        const { useRef, useEffect, useState } = React;
        const { motion, useInView } = window.Motion;

        // Error boundary
        class ErrB extends React.Component {
            constructor(p){ super(p); this.state={e:null}; }
            static getDerivedStateFromError(e){ return {e}; }
            render(){
                if(this.state.e) return <div className="glass-strong p-6 rounded-2xl text-center m-4">
                    <p className="text-amber-400 text-lg mb-1">⚡ Section unavailable</p>
                    <p className="text-white/50 text-xs mb-3">{this.state.e.message}</p>
                    <button onClick={()=>this.setState({e:null})} className="glass px-4 py-1 rounded-full text-xs">Retry</button>
                </div>;
                return this.props.children;
            }
        }

        // 3D Agent
        function Agent3D() {
            const ref = useRef(null);
            const [ok, setOk] = useState(false);
            useEffect(() => {
                const c = ref.current; if(!c || !window.THREE) { setOk(true); return; }
                try {
                    const s = new THREE.Scene();
                    const cam = new THREE.PerspectiveCamera(42, c.clientWidth/Math.max(c.clientHeight,1), 0.1, 100);
                    cam.position.z=5.5;
                    const r = new THREE.WebGLRenderer({alpha:true,antialias:true});
                    r.setSize(c.clientWidth,c.clientHeight); r.setPixelRatio(Math.min(devicePixelRatio,2));
                    r.setClearColor(0,0); c.appendChild(r.domElement);

                    const core = new THREE.Mesh(
                        new THREE.IcosahedronGeometry(1.1,3),
                        new THREE.MeshStandardMaterial({color:0xff5e00,roughness:0.18,metalness:0.85,emissive:new THREE.Color(0x2a0800)})
                    ); s.add(core);
                    const eyeMat = new THREE.MeshStandardMaterial({color:0x00f0ff,roughness:0.05,emissive:new THREE.Color(0x003333),emissiveIntensity:1.2});
                    const le = new THREE.Mesh(new THREE.SphereGeometry(0.22,20,20), eyeMat); le.position.set(-0.42,0.35,0.95);
                    const re = new THREE.Mesh(new THREE.SphereGeometry(0.22,20,20), eyeMat); re.position.set(0.42,0.35,0.95);
                    s.add(le); s.add(re);
                    const ring = new THREE.Mesh(new THREE.TorusGeometry(1.35,0.06,16,80), new THREE.MeshStandardMaterial({color:0xff8c1a,roughness:0.22,metalness:0.95,emissive:new THREE.Color(0x1a0500)}));
                    ring.rotation.x=Math.PI/2.1; s.add(ring);
                    const ring2 = new THREE.Mesh(new THREE.TorusGeometry(1.2,0.04,12,60), new THREE.MeshStandardMaterial({color:0x00aaff,roughness:0.15,metalness:0.9,emissive:new THREE.Color(0x001122)}));
                    ring2.rotation.x=Math.PI/1.6; ring2.rotation.y=Math.PI/3; s.add(ring2);
                    s.add(new THREE.AmbientLight(0x334466,0.9));
                    const d1 = new THREE.DirectionalLight(0xffccaa,1.5); d1.position.set(3,3,5); s.add(d1);
                    const d2 = new THREE.DirectionalLight(0x88ccff,0.8); d2.position.set(-2,-1,-3); s.add(d2);
                    s.add(new THREE.PointLight(0x0066ff,0.7,8)).position.set(1,-1,2);

                    let id;
                    function anim(){
                        id=requestAnimationFrame(anim);
                        const t=Date.now()*0.001;
                        core.rotation.y+=0.008; core.rotation.x=Math.sin(t*0.4)*0.1;
                        ring.rotation.z+=0.012; ring2.rotation.z-=0.008; ring2.rotation.x+=0.005;
                        le.material.emissiveIntensity=0.5+Math.sin(t*3.5)*0.4;
                        re.material.emissiveIntensity=0.5+Math.cos(t*3.5)*0.4;
                        r.render(s,cam);
                    }
                    anim(); setOk(true);
                    const resize=()=>{
                        cam.aspect=c.clientWidth/Math.max(c.clientHeight,1); cam.updateProjectionMatrix();
                        r.setSize(c.clientWidth,c.clientHeight);
                    };
                    window.addEventListener('resize',resize);
                    return ()=>{ cancelAnimationFrame(id); window.removeEventListener('resize',resize); c.removeChild(r.domElement); r.dispose(); };
                } catch(e){ setOk(true); }
            },[]);
            return (
                <div ref={ref} className="agent-3d-wrap w-full h-72 sm:h-80 md:h-96 lg:h-[440px] relative">
                    <div className="agent-glow"/>
                    {!ok && <div className="absolute inset-0 flex items-center justify-center z-10"><span className="text-5xl animate-bounce">🤖</span></div>}
                </div>
            );
        }

        // Terminal
        function Term() {
            const [lines, setLines] = useState([]);
            const mounted = useRef(true);
            const script = [
                {t:"$ manusclaw \"Build REST API\"", c:"text-green-300"},
                {t:"▸ Starting agent run (session 3f2a1b4c)", c:"text-blue-200"},
                {t:"▸ Step 1/30 — PAORR loop initiated", c:"text-gray-300"},
                {t:"▸ Tool: web_search('Python async frameworks')", c:"text-yellow-200"},
                {t:"▸ Result: FastAPI, Litestar, Sanic found", c:"text-gray-400"},
                {t:"▸ Step 2/30 — Writing scaffold", c:"text-gray-300"},
                {t:"▸ Tool: str_replace_editor → api.py", c:"text-yellow-200"},
                {t:"▸ Running tests: python_execute...", c:"text-blue-200"},
                {t:"✓ All 14 tests passed.", c:"text-green-400 font-bold"},
                {t:"✓ Session finished: 6 steps · 2.8s", c:"text-green-300"},
            ];
            useEffect(()=>{
                mounted.current=true; let i=0;
                const iv=setInterval(()=>{ if(!mounted.current) return; if(i<script.length){ setLines(p=>[...p,script[i]]); i++; } else clearInterval(iv); },300);
                return ()=>{ mounted.current=false; clearInterval(iv); };
            },[]);
            return (
                <div className="terminal-box w-full max-w-2xl mx-auto">
                    {lines.map((l,i)=>l?<div key={i} className="terminal-line flex gap-2"><span className="text-amber-400 select-none">❯</span><span className={l.c}>{l.t}</span></div>:null)}
                    <div className="flex gap-2 mt-1"><span className="text-amber-400">❯</span><span className="cursor-blk"/></div>
                </div>
            );
        }

        // Chat
        function Chat() {
            const [msgs, setMsgs] = useState([]);
            const mounted = useRef(true);
            const dialog = [
                {s:'user',t:'Build me a CPU monitor CLI'},
                {s:'agent',t:'Analyzing… using psutil + rich.'},
                {s:'agent',t:'Installing dependencies in sandbox…'},
                {s:'user',t:'Add live graph too.'},
                {s:'agent',t:'Good idea. Adding matplotlib.'},
                {s:'agent',t:'✓ Done. cpu_monitor.py — 142 lines.'},
            ];
            useEffect(()=>{
                mounted.current=true; let i=0;
                const iv=setInterval(()=>{ if(!mounted.current) return; if(i<dialog.length){ setMsgs(p=>[...p,dialog[i]]); i++; } else clearInterval(iv); },650);
                return ()=>{ mounted.current=false; clearInterval(iv); };
            },[]);
            return (
                <div className="flex flex-col gap-1 w-full max-w-sm mx-auto p-3">
                    {msgs.map((m,i)=>m?<div key={i} className={`chat-bubble ${m.s==='user'?'chat-user':'chat-agent'}`}><span className="text-[10px] opacity-50 block mb-0.5">{m.s==='user'?'You':'🤖 ManusClaw'}</span>{m.t}</div>:null)}
                </div>
            );
        }

        // Mind map
        function MindMap() {
            const ref = useRef(null); const [vis,setVis]=useState(false);
            useEffect(()=>{ const el=ref.current; if(!el) return; const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);obs.disconnect();}},{threshold:0.3}); obs.observe(el); return ()=>obs.disconnect(); },[]);
            const nodes = [
                {id:'pm',label:'Product\nManager',x:80,y:90,color:'#ff8c00',delay:0},
                {id:'arch',label:'Architect',x:280,y:30,color:'#a855f7',delay:0.2},
                {id:'eng',label:'Engineer',x:280,y:160,color:'#f59e0b',delay:0.35},
                {id:'qa',label:'QA',x:460,y:95,color:'#10b981',delay:0.5},
            ];
            const edges=[{from:'pm',to:'arch'},{from:'pm',to:'eng'},{from:'arch',to:'eng'},{from:'eng',to:'qa'}];
            return (
                <div ref={ref} className="relative w-full max-w-lg mx-auto h-64 select-none">
                    <svg className="absolute inset-0 w-full h-full" viewBox="0 0 540 220">
                        {edges.map((e,i)=>{ const f=nodes.find(n=>n.id===e.from), t=nodes.find(n=>n.id===e.to); return <line key={i} x1={f.x+28} y1={f.y+28} x2={t.x+28} y2={t.y+28} stroke="rgba(255,255,255,0.25)" strokeWidth="2" className="mind-line" style={{animationDelay:`${0.4+i*0.25}s`,animationPlayState:vis?'running':'paused'}}/>; })}
                    </svg>
                    {nodes.map(n=><div key={n.id} className="mind-node" style={{left:n.x,top:n.y,borderColor:n.color,color:n.color,animationDelay:`${n.delay}s`,animationPlayState:vis?'running':'paused'}}>{n.label.split('\n').map((l,i)=><span key={i}>{l}</span>)}</div>)}
                </div>
            );
        }

        // Reveal
        function Rev({children,className="",delay=0}) {
            const ref=useRef(null); const [v,setV]=useState(false);
            useEffect(()=>{ const el=ref.current; if(!el) return; const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);o.disconnect();}},{threshold:0.12}); o.observe(el); return ()=>o.disconnect(); },[]);
            return <div ref={ref} className={`reveal-el ${v?'visible':''} ${className}`} style={{transitionDelay:`${delay}s`}}>{children}</div>;
        }

        function App() {
            const [copied,setCopied]=useState('');
            const copy=(t)=>{ navigator.clipboard.writeText(t); setCopied(t); setTimeout(()=>setCopied(''),1800); };
            const features = [
                {t:'6 LLM Providers',d:'OpenAI, Anthropic, Gemini, Mistral, Bedrock, and any OpenAI-compatible endpoint.'},
                {t:'Offline Mode',d:'Ollama, LM Studio, direct GGUF files — zero internet, fully air-gapped.'},
                {t:'FTS5 Memory',d:'Cross-session SQLite search so the agent never forgets.'},
                {t:'Cron Scheduler',d:'Schedule any prompt, deliver results to Telegram/Discord.'},
                {t:'Platform Control',d:'Autonomous GitHub, Vercel, WordPress, HuggingFace deployments.'},
                {t:'Desktop GUI',d:'Flet-based native app for Linux, macOS, Windows.'},
            ];
            const donations = [
                {label:'USDT (TRC20)',addr:'TH75J4zaMPwhyR3QxEFdwTCgU2Pp3yPUEr'},
                {label:'WebMoney WMT',addr:'T202226490170'},
                {label:'WebMoney WMZ',addr:'Z430378899900'},
                {label:'bKash (BD)',addr:'01310211442'},
            ];
            const contacts = [
                {name:'Email',url:'mailto:thejddev.official@gmail.com'},
                {name:'Telegram',url:'https://t.me/aamoviesadmin'},
                {name:'Facebook',url:'https://fb.com/itsshsshobuj'},
                {name:'GitHub',url:'https://github.com/The-JDdev'},
                {name:'Web Interface',url:'https://the-jddev.github.io/ManusClaw'},
            ];

            return (
                <main className="relative">
                    <div className="fixed inset-0 -z-10 bg-gradient-to-br from-[#06060c] via-[#030308] to-[#010104]"/>

                    {/* Nav */}
                    <nav className="fixed top-0 w-full z-40 px-6 py-4 flex items-center justify-between glass-strong rounded-b-[2rem]">
                        <span className="font-mono font-bold text-amber-400 text-sm">ManusClaw v4.0</span>
                        <div className="hidden md:flex gap-6 text-sm text-white/70">
                            <a href="#features" className="hover:text-white transition">Features</a>
                            <a href="#terminal" className="hover:text-white transition">Demo</a>
                            <a href="#mind" className="hover:text-white transition">Pipeline</a>
                            <a href="#contact" className="hover:text-white transition">Contact</a>
                            <a href="#donate" className="hover:text-amber-400 transition">Donate</a>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section className="min-h-screen flex flex-col items-center justify-center pt-24 pb-12 px-5 text-center">
                        <Rev><ErrB><div className="glass-strong p-4 sm:p-6 rounded-[2.5rem] mb-8 max-w-4xl w-full"><Agent3D/></div></ErrB></Rev>
                        <Rev delay={0.15}><h1 className="font-heading italic text-5xl sm:text-6xl md:text-7xl lg:text-8xl leading-[0.85] tracking-[-3px]"><span className="hl">ManusClaw</span> <span className="text-white/90">v4.0</span></h1></Rev>
                        <Rev delay={0.3}><p className="mt-5 text-base sm:text-lg md:text-xl text-white/65 font-light max-w-xl">The <span className="hl-cyan hl">autonomous AI ecosystem</span> — multi‑agent, self‑improving, with skills, memory, and offline power.</p></Rev>
                        <Rev delay={0.45}><div className="flex flex-wrap gap-3 mt-7"><a href="#terminal" className="glass-strong px-5 py-3 rounded-full font-semibold text-sm flex items-center gap-2 hover:scale-105 transition">⚡ Live Demo</a><a href="https://github.com/The-JDdev/ManusClaw" target="_blank" className="glass px-5 py-3 rounded-full font-medium text-sm flex items-center gap-2 hover:bg-white/8 transition">⭐ Star on GitHub</a></div></Rev>
                    </section>

                    {/* Terminal */}
                    <section id="terminal" className="py-20 px-5"><Rev><h2 className="font-heading italic text-4xl md:text-5xl text-center mb-4">Watch it <span className="hl">execute</span></h2></Rev><Rev delay={0.2}><ErrB><Term/></ErrB></Rev></section>

                    {/* Chat */}
                    <section className="py-20 px-5 bg-black/20"><Rev><h2 className="font-heading italic text-4xl md:text-5xl text-center mb-10">Conversational <span className="hl-cyan hl">control</span></h2></Rev><Rev delay={0.2}><ErrB><Chat/></ErrB></Rev></section>

                    {/* Mind map */}
                    <section id="mind" className="py-20 px-5"><Rev><h2 className="font-heading italic text-4xl md:text-5xl text-center mb-4">Multi‑Agent <span className="hl">DAG Pipeline</span></h2></Rev><Rev delay={0.15}><MindMap/></Rev></section>

                    {/* Features */}
                    <section id="features" className="py-20 px-5"><Rev><h2 className="font-heading italic text-4xl md:text-5xl text-center mb-16">Everything <span className="hl">built‑in</span></h2></Rev>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 max-w-5xl mx-auto">{features.map((f,i)=><Rev key={i} delay={i*0.08}><div className="glass card-hover p-6 rounded-2xl h-full"><h3 className="font-heading italic text-2xl mb-3">{f.t}</h3><p className="text-white/55 text-sm">{f.d}</p></div></Rev>)}</div>
                    </section>

                    {/* Donate */}
                    <section id="donate" className="py-20 px-5 border-t border-white/5"><Rev><h2 className="font-heading italic text-4xl md:text-5xl text-center mb-4">💎 <span className="hl">Fuel the Beast</span></h2><p className="text-center text-white/50 max-w-md mx-auto mb-10 text-sm">Built from Bangladesh on a smartphone. Your support keeps this engine alive.</p></Rev>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-xl mx-auto">{donations.map((d,i)=><Rev key={i} delay={i*0.08}><div className="glass p-4 rounded-2xl flex items-center justify-between gap-3"><div className="min-w-0"><span className="text-white/65 text-xs">{d.label}</span><p className="font-mono text-amber-300/80 text-xs mt-1 truncate">{d.addr}</p></div><button onClick={()=>copy(d.addr)} className="glass rounded-full p-2 hover:bg-white/10">{copied===d.addr?'✓':'📋'}</button></div></Rev>)}</div>
                    </section>

                    {/* Contact */}
                    <section id="contact" className="py-20 px-5 border-t border-white/5"><Rev><h2 className="font-heading italic text-4xl md:text-5xl text-center mb-8">Contact & Community</h2></Rev>
                        <div className="flex flex-wrap justify-center gap-4 max-w-2xl mx-auto">{contacts.map((c,i)=><Rev key={i} delay={i*0.08}><a href={c.url} target="_blank" className="glass px-5 py-3 rounded-full text-sm font-medium hover:bg-white/10 transition">{c.name}</a></Rev>)}</div>
                        <Rev delay={0.4}><p className="text-center text-white/25 text-xs mt-10">MIT License · Built by <a href="https://github.com/The-JDdev" className="text-amber-400/50 underline">The-JDdev</a></p></Rev>
                    </section>
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrB><App/></ErrB>);
    </script>
    <noscript><div style="color:white;text-align:center;padding:3rem;">JavaScript required.</div></noscript>
</body>
</html>
